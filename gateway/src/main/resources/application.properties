spring.application.name=api-gateway
server.port=8080

# ========== Spring Cloud Gateway Routes ==========
# Routes use load-balanced (lb://) URIs for service discovery
# Each service will be registered with its own service name

# ========== AUTH SERVICE (Port 9001) ==========
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# ========== OFFRE SERVICE (Job Offers) (Port 9002) ==========
spring.cloud.gateway.routes[1].id=offre-service
spring.cloud.gateway.routes[1].uri=lb://offre-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/offres/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=offre-service-recruiter
spring.cloud.gateway.routes[2].uri=lb://offre-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/recruteur/*/offres/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# ========== PROFILE SERVICE (Candidats & Recruteurs) (Port 9003) ==========
spring.cloud.gateway.routes[3].id=profile-service-candidat
spring.cloud.gateway.routes[3].uri=lb://profile-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/candidat/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[4].id=profile-service-recruteur
spring.cloud.gateway.routes[4].uri=lb://profile-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recruteur/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[5].id=profile-service-recruteurs-list
spring.cloud.gateway.routes[5].uri=lb://profile-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/recruteurs/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# ========== CANDIDATURE SERVICE (Job Applications) (Port 9004) ==========
spring.cloud.gateway.routes[6].id=candidature-service
spring.cloud.gateway.routes[6].uri=lb://candidature-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/candidatures/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

# ========== AI SERVICE (Matching & Scoring) (Port 9005) ==========
spring.cloud.gateway.routes[7].id=ai-service
spring.cloud.gateway.routes[7].uri=lb://ai-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

# ========== NOTIFICATION SERVICE (Port 9006) ==========
# Will handle SMS, Email, In-app notifications
# Placeholder - routes TBD based on final API design

# ========== MEDIA SERVICE (Port 9007) ==========
# Will handle file uploads, image processing, storage
# Placeholder - routes TBD based on final API design

# ========== Spring Cloud Load Balancer Configuration ==========
# Uses client-side load balancing with health checks
spring.cloud.loadbalancer.enabled=true
spring.cloud.loadbalancer.health-check.enabled=true

# ========== Logging ==========
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG